---
layout: default
banner_url: ""
banner_alt: ""
---

{% include header.html %}

<div class="container">
  <div class="content-wrapper">
    <div class="breakout banner-post"><img src="{{ page.banner_url }}" alt="{{page.banner_alt}}"></div>
    <h1 class="title">{{ page.title }}</h1>
    {{ content }}

    <div class="date">{% if page.updated %}{{ page.updated | date: "%B %d, %Y"}}{% else %}{{ page.date | date: "%B %d, %Y"}}{% endif %}</div>
  </div>
</div>

{% include footer.html %}
