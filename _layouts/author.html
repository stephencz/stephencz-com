---
layout: default
---

<article >
  <div class="post-wrapper">
    <h1 class="title">{{ page.full_name }}</h1>
    <div class="body">{{ page.content }}</div>
  </div>

  <div class="category-wrapper">
    <h1 class="category-title">Articles</h1>
    <ul class="category-post-list">
      {% for post in site.posts %}
        {% if post.author == page.full_name %}
            <li><span> {{post.date | date: "%B %-d, %Y"}} - </span> <a href="{{post.url}}">{{post.title}}</a> by {{ post.author }}</li>
        {% endif %}
      {% endfor %}
    </ul>
  </div>
</article>
