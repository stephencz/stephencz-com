---
layout: default
---

<div class="col-xl-3"></div>

<div class="col-xl-6 order-xl-1 order-sm-12 order-12">
  <div class="post-wrapper feed-wrapper" style="margin-bottom: 60px;">
    <div class="feed-date">
      {{ page.date | date: "%B %-d, %Y"}}<span style="margin-left: 10px;">{{ page.date | date: "%l:%M %p"}}</span>
    </div>

    <div class="body">
      {{ content }}
    </div>
  </div>
</div>

<div class="col-xl-3 order-xl-12 order-sm-1 order-1"></div>
