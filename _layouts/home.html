---
layout: default
---

{% include header.html %}

<div class="container">
  {% for post in site.posts %}
  <div class="content-wrapper">
    <h1 class="title"><a href="{{ post.url }}">{{ post.title }}</a></h1>
    {{ post.content }}

    <div class="date">{% if post.updated %}{{ post.updated | date: "%B %d, %Y"}}{% else %}{{ post.date | date: "%B %d, %Y"}}{% endif %}</div>
  </div>
  {% endfor %}
</div>

{% include footer.html %}
