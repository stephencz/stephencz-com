---
layout: default
---

{% assign counter = 0 %}
{% for post in site.posts limit: 10 %}
  <article class="post-wrapper {%if counter != 0 %} trailing {% endif %}">
      <h1 class="title"><a href="{{ post.url }}">{{ post.title }} <span class="title-arrow">[↩]</span></a></h1>
      {% include metadata.html is_home=true %}
      <div class="body">{{ post.excerpt }}</div>
  </article>
  {% assign counter = counter | plus: 1 %}
{% endfor %}
