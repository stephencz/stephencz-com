---
layout: default
---
<article>
<div class="category-wrapper">
  <h1 class="category-title">{{page.category-name}}</h1>
    <ul class="category-post-list">
    {% for post in site.posts %}
      {% for cat in post.categories %}
        {% if page.category contains cat %}
          <li> <span> {{post.date | date: "%B %-d, %Y"}} - </span> <a href="{{post.url}}">{{post.title}}</a> by {{ post.author }} </li>
        {% endif %}
      {% endfor %}   
    {% endfor %}
    </ul>
  </div>
</article>
