<!DOCTYPE html>
<html>
<head>

  {% capture page_title %} {{ page.title }} {% endcapture %}
  {% assign custom_title = page_title %}
  {% assign custom_description = page.description %}
    
  <!-- Meta Tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
  <title>{{ page.title }} | Stephen Czekalski</title>
    
  <meta name="description" content="{{ page.description }}">
  <meta name=”robots” content=”index, follow”>
    
  <link rel=”canonical” href=”https://creamofpotato.com/” />
    
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">

</head>
<body>

  <div class="container" style="margin-bottom: 120px;">
    <div class="row">
      <div class="col-xl-6 mx-auto">{% include nav.html %}</div>
    </div>

    <div class="row">
      <div class="col-xl-3"> {% include toc.html %}</div>
      <div class="col-xl-6"> {{ content }} </div>
      <div class="col-xl-3"></div>
    </div>
  </div>

  <div class="sn-row">
    <div class="sn-col-left"></div>
    <div class="sn-col-right"></div>
  </div>
  

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/typeit/6.0.3/typeit.min.js"></script>

  <script src="/assets/js/sidenote.js"></script>

</body>
</html>
