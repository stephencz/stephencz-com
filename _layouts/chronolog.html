---
layout: default
---

{% include header.html %}

<div class="container">
  <div class="content-wrapper">
    <h1 class="title">Chronolog</h1>
    {{ content }}
    <ul class="chronolog">
      {% for post in site.posts %}
        <li>
          <span>{% if post.updated %}{{ post.updated | date: "%B %d, %Y"}}{% else %}{{ post.date | date: "%B %d, %Y"}}{% endif %} - </span>
          <a href="{{ post.url }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>

{% include footer.html %}
