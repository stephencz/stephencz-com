---
layout: default
---
<article>
<div class="category-wrapper">
    <h1 class="category-title">Archive</h1>
    <ul class="category-post-list">
    {% for post in site.posts %}
      <li><span> {{post.date | date: "%B %-d, %Y"}} - </span> <a href="{{post.url}}">{{post.title}}</a></li>
    {% endfor %}
    </ul>
</div>
</article>
