{% if page.toc == true %}
  <div class="toc-wrapper">
    <div class="header">
      <a href="#{{ page.title | downcase | replace: ' ', '-' }}">{{ page.title }}</a>
    </div>

    <div class="toc {% if page.toc_grow == true %}grow{% endif %}">
      {% table_of_contents %}
    </div>
  </div>
{% endif %}
