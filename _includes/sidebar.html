<div class="sidebar-wrapper">
    <nav>
        <ul>
            {% for nav in site.data.navigation %}
            <li><a href="{{ nav.link }}" >{{ nav.name }}</a></li>
            {% endfor %}
        </ul>
    </nav>
    <div class="info">
        <div class="info-section">Links</div>
        <ul>
            {%- for link in site.data.sidebar-links -%}
            <li><a href="{{ link.url }}" target="_blank">{{ link.name }}</a></li>
            {%- endfor -%}
        </ul>

        <div class="copyright">
            Stephen Czekalski © 2021
        </div>
    </div>
</div>
