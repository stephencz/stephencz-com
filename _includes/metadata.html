{% if page.metadata == true %}
<div class="metadata-wrapper">
  <div class="metadata {% if page.metadata_grow == true %}grow{% endif %}">
    <div class="metadata-info">
      Series: 
      {% if page.is_series %} 
      <a href="/series/{{ page.series_name | downcase | repalce: ' ', '-' }}"> {{ page.series_name }} </a> 
      {% endif %}
    </div>

  </div>
</div>
{% endif %}
