

title: Stephen Czekalski
email: admin@stephencz.com
description: >- # this means to ignore newlines until "baseurl:"
  The personal website of Stephen Czekalski
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
github_username: stephencz
permalink: /blog/:title

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  highlighter: rouge
  parse_block_html: true
  syntax_highlighter_opts:
    block:
      line_numbers: true

sass:
  style: compressed

plugins:
  - jekyll-feed

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      title: "Untitled Post"
      categories: []
      group: default
  -
    scope:
      path: ""
      type: "pages"
    values:
      title: "Untitled Page"
      categories: []
      group: default

collections:
  showcases:
    output: true
    
  notes:
    output: true

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - connect.sh
  - vendor
