
# Site Settings
title: Stephen Czekalski
description: "The personal website of Stephen Czekalski"
email: admin@stephencz.com
github_username: stephencz

url: "https://stephencz.com" 
baseurl: "/" 
permalink: /docs/:title

# Collection Definitions
collections:
  showcases:
    output: true
    
  other:
    output: true

# Frontmatter Defaults
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      title: "Untitled Post"
      categories: []
      group: default
  -
    scope:
      path: ""
      type: "pages"
    values:
      title: "Untitled Page"
      group: default
  -
    scope:
      path: ""
      type: "other"
    values:
      title: "Untitled Other"
      group: default

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  highlighter: rouge
  parse_block_html: true
  syntax_highlighter_opts:
    block:
      line_numbers: true

sass:
  style: compressed

plugins:
  - jekyll-feed

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - connect.sh
  - vendor