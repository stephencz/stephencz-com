

title: Stephen Czekalski
email: admin@stephencz.com
description: >- # this means to ignore newlines until "baseurl:"
  The personal website of Stephen Czekalski
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
github_username: stephencz
permalink: /blog/:title

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  highlighter: rouge
  parse_block_html: true
  syntax_highlighter_opts:
    block:
      line_numbers: true

sass:
  style: compressed

plugins:
  - jekyll-feed

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      title: "Untitled Post"
      author: "Stephen Czekalski"
      description: "It looks like Stephen forgot to fill out this post's description..."
      categories: ["primary", "secondary"]
      group: default
  -
    scope:
      path: ""
      type: "notes"
    values:
      layout: "note"
      title: "Untitled Note"
      author: "Stephen Czekalski"
      description: "It looks like Stephen forgot to fill out this note's description..."
      group: default
  -
    scope:
      path: ""
      type: "other"
    values:
      layout: "page"
      title: "Untitled Other"
      author: "Stephen Czekalski"
      description: "It looks like Stephen forgot to fill out this note's description..."
      group: default
  -
    scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      title: "Untitled Project"
      author: "Stephen Czekalski"
      description: "It looks like Stephen forgot to fill out this project's description..."
      group: default

collections:
  notes:
    output: true

  projects:
    output: true

  other:
    output: true

  csv:
    output: true

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - connect.sh
