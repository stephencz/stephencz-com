# Basic information for site
title: Stephen Czekalski
email: admin@stephencz.com
description: The personal website of Stephen Czekalski. A place for me to store my writings and works on the topics which interest me.
baseurl: "/" 
url: "https://www.stephencz.com" 
twitter_username: stephencz_
github_username:  stephencz
permalink: /posts/:title

# Default variables
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      toc: true                         # True when a table of contents should be generated. Otherwise false.
      scripts: []

  -
    scope:
      path: ""
      type: "posts"
    values:
      is_post: true                     # DO NOT EDIT: True to indicate is a post.
      show_home: true                   # True when the post should be displayed on the home page feed. Otherwise false.
      toc: true                         # True when a table of contents should be generated. Otherwise false.
      toc_grow: true                    # True when the TOC should grow instead of scroll.
      metadata: true                    # True when the metadata section should be shown.
      metadata_grow: true               # True when the metadata section should grow instead of scroll.
      related_links: []                 # A list of links that will be displayed in the metadata section.
      living_document: false            # True when the post should be labeled a 'living document'. Aesthetic thingy for metadata.
      excerpt_separator: <!--more-->    # DO NOT EDIT: This symbol will stop the excerpt. Used to control excerpt length.

  -
    scope:
      path: ""
      type: "pages"
    values:
      is_page: true                     # DO NOT EDIT: True to indicate is a page.
      toc: false                        # True when a table of contents should be generated. Otherwise false.
      toc_grow: false                   # True when the TOC should grow instead of scroll.

# Markdown and Kramdown configuration.
markdown: kramdown
kramdown:
  input: GFM
  highlighter: rouge
  parse_block_html: true
  syntax_highlighter_opts:
    block:
      line_numbers: true

collections:
  feed_posts:
    pinned: false
    permalink: /feed-posts/:year/:month/:title
    output: true
    date_shift: 0
  other:
    permalink: /other/:title
    output: true

# Sass configuration
sass:
  style: compressed

feed:
  collections:
    feed_posts:
      path: "/feed-posts/feed.xml"


#Jekyll Scholar configuration
scholar:
  style: _bibliography/apa
  locale: en

  sort_by: author, year, month, day
  order: ascending

  source: ./_bibliography
  bibliography: references.bib
  bibliography_template: "{{ reference }}"

  reference_tagname: "p"

  replace_strings: true
  join_strings:    true

  bibtex_filters:
    - href

  query: "@*"

jekyll-minifier:
  uglifier_args:
    harmony: true

# Plugins used by this site
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-scholar
  - jekyll-minifier

# Folders and files to exclude from the site build
exclude:
  - /scripts
  - /vendor
  - /screenshot.png
  - /README.md
  - /LICENSE
  - /Gemfile
  - /Gemfile.lock
  - node_modules
  - .vendor/bundle/
  - .vendor/cache/
  - .vendor/gems/
  - .vendor/ruby/
  - .vendor
