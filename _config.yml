# Basic information for site
title: Stephen Czekalski
email: admin@stephencz.com
description: The personal website of Stephen Czekalski. A place for me to store my writings and works on the topics which interest me.
baseurl: "/" 
url: "https://www.stephencz.com" 
twitter_username: stephencz
github_username:  stephencz
permalink: /posts/:title

# Default variables
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      is_post: true         # DO NOT EDIT: True to indicate is a post.
      toc: true             # True when a table of contents should be generated. Otherwise false.
      show_home: true       # True when the post should be displayed on the home page feed. Otherwise false.
      display_time: true    # True when the reading time for the post should be displayed.
      reading_time: 0       # DO NOT EDIT: The average time in minutes it takes to read the page
      word_count: 0         # DO NOT EDIT: The number of words on the page.
      
      excerpt_separator: <!--more--> # This symbol will stop the excerpt. Used to control excerpt length.

  -
    scope:
      path: ""
      type: "pages"
    values:
      is_page: true         # DO NOT EDIT: True to indicate is a page.
      toc: true             # True when a table of contents should be generated. Otherwise false.
      display_time: true    # True when the reading time for the post should be displayed.

# Markdown and Kramdown configuration.
markdown: kramdown
kramdown:
  input: GFM
  highlighter: rouge
  parse_block_html: true
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Sass configuration
sass:
  style: compressed

#Jekyll Scholar configuration
scholar:
  style: _bibliography/apa
  locale: en

  sort_by: author, year, month, day
  order: ascending

  source: ./_bibliography
  bibliography: references.bib
  bibliography_template: "{{ reference }}"

  reference_tagname: "p"

  replace_strings: true
  join_strings:    true

  bibtex_filters:
    - href

  query: "@*"

# Plugins used by this site
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-scholar

# Folders and files to exclude from the site build
exclude:
  - /scripts
  - /vendor
  - /screenshot.png
  - /README.md
  - /LICENSE
  - /Gemfile
  - /Gemfile.lock
  - node_modules
  - .vendor/bundle/
  - .vendor/cache/
  - .vendor/gems/
  - .vendor/ruby/
